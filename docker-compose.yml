version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledge-assistant-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
      - TEMPERATURE=0.7
    volumes:
      - ./backend/data/uploads:/backend/app/uploads
      - ./backend/data/chroma_db:/backend/app/chroma_db
      - ./backend/data/models_cache:/backend/models_cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowledge-assistant-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
